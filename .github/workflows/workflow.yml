name: CI & Deploy & Auto Assign PR Author

on:
  push:
    branches:
      - main
      - testing
  pull_request:
    branches:
      - main
      - testing

permissions:
  contents: read
  pull-requests: write

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgis/postgis:16-3.4-alpine
        env:
          POSTGRES_USER: app
          POSTGRES_PASSWORD: password
          POSTGRES_DB: testing
        options: >-
          --health-cmd="pg_isready -U app"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
        ports:
          - 6379:6379

    if: github.event_name == 'push' || github.event_name == 'pull_request'
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          extensions: mbstring, bcmath, ctype, fileinfo, json, pdo, pdo_pgsql, tokenizer, xml, redis
          tools: composer:v2
          coverage: ${{ github.event_name == 'pull_request' && 'xdebug' || 'none' }}


      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.composer/cache/files
            vendor
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-composer-

      - name: Install PHP Dependencies
        run: composer install --prefer-dist --no-progress --no-interaction --optimize-autoloader

      - name: Prepare Environment
        run: |
          if [ -f .env ]; then rm .env; fi
          cp .env.ci .env
          php -r "file_exists('.env') || exit(1);"
          php artisan key:generate --no-interaction
        env:
          APP_ENV: local
          APP_DEBUG: 'true'
          APP_URL: http://localhost
          CACHE_DRIVER: redis
          SESSION_DRIVER: array
          REDIS_HOST: 127.0.0.1
          REDIS_PORT: 6379
          QUEUE_CONNECTION: sync
          BROADCAST_DRIVER: log
          MAIL_MAILER: log

      - name: Wait for PostgreSQL to be ready
        run: |
          for i in {1..30}; do
            (echo > /dev/tcp/127.0.0.1/5432) >/dev/null 2>&1 && break
            sleep 2
          done

      - name: Check Code Style (Pint)
        run: composer pint-test

      - name: Run Tests
        if: github.event_name == 'push'
        run: composer test

      - name: Run Tests with Coverage (PR)
        if: github.event_name == 'pull_request'
        run: composer test-with-coverage

      - name: Code Coverage Summary Report
        if: github.event_name == 'pull_request'
        uses: irongut/CodeCoverageSummary@v1.3.0
        with:
          filename: ./**/coverage.cobertura.xml
          badge: true
          format: markdown
          output: both

      - name: Add Coverage Summary to PR
        if: github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: test-coverage
          hide_and_recreate: true
          hide_classify: "OUTDATED"
          path: code-coverage-results.md

      - name: Archive code coverage results
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: code-coverage-report
          path: code-coverage-results.md

      - name: Upload Coverage Artifact (PR)
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage-report

      - name: Run Static Analysis (PHPStan)
        run: composer phpstan


  deploy-production:
    name: Deploy to Production Server
    runs-on: ubuntu-latest
    environment: production
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ vars.HOST_IP }}
          username: ${{ secrets.SERVER_USERNAME }}
          key: ${{ secrets.DEPLOY_KEY }}
          script_stop: true
          script: |
            cd ${{ vars.APP_PATH }}
            git pull origin main
            composer install --no-dev --prefer-dist --optimize-autoloader --no-interaction --no-progress
            npm ci
            npm run build
            php artisan migrate --force
            php artisan tenants:migrate --force
            php artisan permissions:sync
            php artisan config:clear
            php artisan route:clear
            php artisan view:clear
            php artisan cache:clear
            php artisan queue:restart


  deploy-testing:
    name: Deploy to Staging Server
    runs-on: ubuntu-latest
    environment: staging
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/testing'

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ vars.HOST_IP }}
          username: ${{ secrets.SERVER_USERNAME }}
          key: ${{ secrets.DEPLOY_KEY }}
          script_stop: true
          script: |
            cd ${{ vars.APP_PATH }}
            git pull origin testing
            composer install --prefer-dist --optimize-autoloader --no-interaction --no-progress
            npm ci
            npm run build
            php artisan migrate --force
            php artisan tenants:migrate --force
            php artisan permissions:sync
            php artisan config:clear
            php artisan route:clear
            php artisan view:clear
            php artisan cache:clear
            php artisan queue:restart


  assign-author:
    name: Auto Assign PR Author
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' && (github.event.action == 'opened' || github.event.action == 'reopened')
    steps:
      - name: Assign PR author
        uses: actions-ecosystem/action-add-assignees@v1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          assignees: ${{ github.actor }}
